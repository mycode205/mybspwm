[window]
# Adds a slight padding so text isn't cramped against the edges
padding = { x = 12, y = 12 }
dynamic_padding = true

# Subtle transparency for a modern "glass" look
# (Set to 1.0 for completely opaque)
opacity = 0.92
blur = true

[font]
size = 11.0

normal = { family = "JetBrains Mono", style = "Regular" }
bold   = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }

[font.offset]
# This adds 2 pixels of space between lines. 
# This is what makes it look "Clean" rather than "Cramped"
y = 2


[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500

# Minimalist "One Dark" inspired color scheme
[colors.primary]
background = "#1e222a"
foreground = "#abb2bf"

[colors.normal]
black =   "#1e222a"
red =     "#e06c75"
green =   "#98c379"
yellow =  "#d19a66"
blue =    "#61afef"
magenta = "#c678dd"
cyan =    "#56b6c2"
white =   "#abb2bf"
