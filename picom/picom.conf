backend = "glx";
vsync = true;

corner-radius = 4;

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;


animations = true;

animation-stiffness = 150;
animation-window-mass = 0.4;
animation-dampening = 25;
animation-clamping = false;

