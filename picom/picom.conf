backend = "glx";
vsync = true;

# Corner
corner-radius = 4;
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;

#################################
#      Fading     #
#################################
fading = true;
fade-in-step = 0.012;
fade-out-step = 0.012;

#################################
#    ANIMATION     #
#################################
animations = true;
animation-stiffness = 100;     
animation-window-mass = 0.7;   
animation-dampening = 25;      
animation-clamping = false;    

