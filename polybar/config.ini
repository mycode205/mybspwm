[colors]
; Nord Palette Colors
nord0  = #2e3440
nord1  = #3b4252
nord2  = #434c5e
nord3  = #4c566a
nord4  = #d8dee9
nord5  = #e5e9f0
nord6  = #eceff4
nord7  = #8fbcbb
nord8  = #88c0d0
nord9  = #81a1c1
nord10 = #5e81ac
nord11 = #bf616a
nord12 = #d08770
nord13 = #ebcb8b
nord14 = #a3be8c
nord15 = #b48ead

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 20pt
radius = 0

background = ${colors.nord0}
foreground = ${colors.nord4}

; Removed line-size to ensure no accidental underlines appear anywhere
line-size = 0

padding-left = 2
padding-right = 2
module-margin = 1

# font-0: Main Text & Labels
font-0 = "JetBrains Mono:size=10;2"

# font-1: Font Awesome Icons
font-1 = "Font Awesome 6 Free Solid:size=10;2"

# font-2: JetBrainsMono Nerd Font (Handles your battery icons)
font-2 = "JetBrainsMono Nerd Font:size=10;2"

# font-3: FiraCode Nerd Font (Added for you to try out!)
font-3 = "FiraCode Nerd Font:size=10;2"


modules-left =  xworkspaces powermenu
modules-center = xwindow
modules-right = notification-bell network pulseaudio battery date 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/powermenu]
type = custom/text
; Standard Power symbol from Nerd Fonts / Font Awesome
content = " "
content-foreground = ${colors.nord11}
content-padding = 1

; printf replaces echo -e completely to eliminate the literal "-e" bug
click-left = printf "󰑓  Reload\n󰈆  Logout\n󰜉  Reboot\n  Poweroff\n" | rofi -dmenu -p "System:" | awk '{print $2}' | xargs -I {} bash -c 'if [ "{}" = "Reload" ]; then pkill -USR1 -x sxhkd && bspc wm -r; elif [ "{}" = "Logout" ]; then bspc quit; elif [ "{}" = "Reboot" ]; then systemctl reboot; elif [ "{}" = "Poweroff" ]; then systemctl poweroff; fi'


[module/xworkspaces]
type = internal/xworkspaces

; Maps Roman numeral workspace names from your WM to regular numbers
icon-0 = I;1
icon-1 = II;2
icon-2 = III;3
icon-3 = IV;4
icon-4 = V;5
icon-5 = VI;6
icon-6 = VII;7
icon-7 = VIII;8
icon-8 = IX;9
icon-9 = X;10

; Active workspace (No background block, no underline, just bright text color)
label-active = %icon%
label-active-foreground = ${colors.nord8}
label-active-padding = 1

; Occupied workspaces (Windows open, but not focused)
label-occupied = %icon%
label-occupied-foreground = ${colors.nord5}
label-occupied-padding = 1

; Urgent workspaces (e.g., a notification or alert)
label-urgent = %icon%
label-urgent-foreground = ${colors.nord11}
label-urgent-padding = 1

; Empty workspaces
label-empty = %icon%
label-empty-foreground = ${colors.nord3}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
; Shows the window title up to 60 characters
label = %title:0:60:...%
label-foreground = #ffffff

; Displays "Desktop" when no window is active/focused
label-empty = Desktop
label-empty-foreground = #ffffff

[module/network]
type = internal/network
interface = wlo1
interface-type = wireless
interval = 3

format-connected = <label-connected>
format-connected-foreground = ${colors.nord9}
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.nord9}
label-connected = %essid%

format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.nord11}
format-disconnected-prefix = "󰤮 "
format-disconnected-prefix-foreground = ${colors.nord11}
label-disconnected = disconnected

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

; Added <ramp-volume> here so the icon changes dynamically with the volume level
format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.nord13}
label-volume = %percentage%%

format-muted = <label-muted>
format-muted-foreground = ${colors.nord3}
format-muted-prefix = "󰝟 "
format-muted-prefix-foreground = ${colors.nord3}
label-muted = muted

; Dynamic Volume Icons (from quiet to loud)
ramp-volume-0 = " "
ramp-volume-1 = " "
ramp-volume-2 = " "
ramp-volume-foreground = ${colors.nord13}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
low-at = 15

format-charging = <label-charging>
format-charging-foreground = ${colors.nord14}
label-charging = 󱐥 %percentage%%

format-discharging = <label-discharging>
format-discharging-foreground = ${colors.nord8}
label-discharging = 󰁹 %percentage%%

format-full = <label-full>
format-full-foreground = ${colors.nord14}
label-full = 󰁹 100%

format-low = <label-low>
format-low-foreground = ${colors.nord11}
label-low = 󰂃 %percentage%%

[module/date]
type = internal/date
interval = 1

; Changed to 12-hour format with AM/PM (e.g., 03:30 PM)
date = %I:%M %p
date-alt = %Y-%m-%d %I:%M:%S %p

; Added a prefix icon layout for the clock icon
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.nord7}

label = %date%
label-foreground = ${colors.nord4}

[module/notification-bell]
type = custom/text
; Font Awesome / Nerd Font bell icon
content = " "
content-foreground = ${colors.nord15}
content-padding = 1

; Left-click: Pop the last notification back up from history
click-left = dunstctl history-pop

; Right-click: Clear all active notifications from the screen
click-right = dunstctl close-all

; Middle-click: Toggle Do Not Disturb mode (Optional)
click-middle = dunstctl set-paused toggle
